# https://docs.github.com/en/github/administering-a-repository/configuration-options-for-dependency-updates

# file-version: 1.0

version: 2

updates:
  - package-ecosystem: "npm"

    directory: "/"

    schedule:
      interval: "cron"
      cronjob: "0 4 19 * *"
      timezone: "Europe/Berlin"

    cooldown:
      default-days: 7

    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

    assignees:
      - "mimmi20"

    labels:
      - "dependencies"

    versioning-strategy: "increase"

    commit-message:
      include: "scope"
      prefix: "npm (master)"

    ignore:
      - dependency-name: "@eslint/js"
        versions: [ ">=10.0.0" ]
      - dependency-name: "eslint"
        versions: [ ">=10.0.0" ]

    # Disable rebasing for all pull requests
    rebase-strategy: "disabled"

  - package-ecosystem: "github-actions"

    directory: "/"

    schedule:
      interval: "cron"
      cronjob: "0 4 19 * *"
      timezone: "Europe/Berlin"

    cooldown:
      default-days: 7

    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

    assignees:
      - "mimmi20"

    labels:
      - "dependencies"

    commit-message:
      prefix: "github-actions (master)"

    ignore:
      - dependency-name: "mimmi20/ci/.github/workflows/validate-all.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/cleanup-cache.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/install-node.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/analytics-node.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/test-node.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/review-dependency.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/lint-actions.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/sync-labels.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/lock-issues.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/reaction-comments.yml"
      - dependency-name: "mimmi20/ci/.github/workflows/draft-release.yml"

    # Disable rebasing for all pull requests
    rebase-strategy: "disabled"
